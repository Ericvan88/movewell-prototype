<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body{margin:0;min-height:100vh;background:#EFEDEA;font-family:'Atkinson Hyperlegible',system-ui,sans-serif;color:#2D3748}
a{color:#6C5CE7}a:hover{color:#5647C9}
@keyframes mwPulse{0%{box-shadow:0 0 0 0 rgba(255,107,107,0.55)}70%{box-shadow:0 0 0 16px rgba(255,107,107,0)}100%{box-shadow:0 0 0 0 rgba(255,107,107,0)}}
@keyframes mwBlink{0%,100%{opacity:1}50%{opacity:0.35}}
</style>
</helmet>
<div>

<sc-if value="{{ isMenu }}" hint-placeholder-val="{{ true }}">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#FFF5F5 0%,#FFFFFF 50%,#F5F3FF 100%);padding:40px 20px;box-sizing:border-box">
<div style="width:820px;background:#fff;border:1px solid #E8E5E1;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.08);padding:36px;display:flex;flex-direction:column;gap:22px;box-sizing:border-box">
<img src="./assets/movewell-primary-gradient.svg" alt="MoveWell" style="height:30px;align-self:flex-start;margin-left:-8px">
<div><h1 style="margin:0;font-size:24px;font-weight:700">Complete prototype</h1><p style="margin:4px 0 0;font-size:14px;color:#4A4540">Choose a workspace or user. Sign out from any app to come back here.</p></div>
<div style="display:flex;gap:28px">
<div style="flex:1;display:flex;flex-direction:column;gap:10px">
<div style="display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:0.1em;color:#4A4540"><i class="fa-solid fa-display" style="color:#5647C9"></i>WEB PORTALS</div>
<sc-for list="{{ webList }}" as="w" hint-placeholder-count="3">
<div onClick="{{ w.onPick }}" style="display:flex;align-items:center;gap:12px;min-height:64px;padding:10px 14px;border:1px solid #E8E5E1;border-radius:12px;cursor:pointer;box-sizing:border-box" style-hover="background:#F7F6F4">
<span style="width:40px;height:40px;border-radius:10px;background:{{ w.avBg }};color:{{ w.avFg }};display:flex;align-items:center;justify-content:center;font-size:16px;flex:none"><i class="fa-solid {{ w.icon }}"></i></span>
<span style="flex:1"><span style="display:block;font-size:14.5px;font-weight:700">{{ w.name }}</span><span style="display:block;font-size:12px;color:#4A4540">{{ w.desc }}</span></span>
<i class="fa-solid fa-arrow-right" style="color:#E8E5E1;font-size:12px"></i>
</div>
</sc-for>
</div>
<div style="flex:1;display:flex;flex-direction:column;gap:10px">
<div style="display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:0.1em;color:#4A4540"><i class="fa-solid fa-mobile-screen" style="color:#E85555"></i>MOBILE</div>
<sc-for list="{{ mobList }}" as="u" hint-placeholder-count="4">
<div style="display:flex;align-items:center;gap:10px;min-height:64px;padding:10px 14px;border:1px solid #E8E5E1;border-radius:12px;box-sizing:border-box">
<div onClick="{{ u.onPick }}" style="flex:1;min-width:0;display:flex;align-items:center;gap:12px;cursor:pointer">
<span style="width:40px;height:40px;border-radius:9999px;background:{{ u.avBg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex:none">{{ u.init }}</span>
<span style="flex:1;min-width:0"><span style="display:block;font-size:14.5px;font-weight:700">{{ u.name }}</span><span style="display:block;font-size:12px;color:#4A4540">{{ u.desc }}</span></span>
</div>
<sc-if value="{{ u.hasReg }}" hint-placeholder-val="{{ true }}">
<span onClick="{{ u.onReg }}" style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9999px;background:#F5F3FF;color:#5647C9;font-size:11.5px;font-weight:700;cursor:pointer;flex:none" style-hover="background:#EDE9FE"><i class="fa-solid fa-user-plus"></i>Sign up</span>
</sc-if>
</div>
</sc-for>
</div>
</div>
</div>
</div>
</sc-if>

<sc-if value="{{ isWebScreen }}" hint-placeholder-val="{{ false }}">
<div style="min-height:100vh;display:flex;flex-direction:column">
<div style="display:flex;align-items:center;gap:14px;height:56px;padding:0 22px;background:#fff;border-bottom:1px solid #E8E5E1;flex:none;box-sizing:border-box">
<img src="./assets/movewell-client-coral.svg" alt="MoveWell" style="height:22px">
<span style="font-size:12px;font-weight:700;letter-spacing:0.12em;color:#4A4540;border-left:1px solid #E8E5E1;padding-left:14px">{{ wsLabel }}</span>
<span style="margin-left:auto;display:flex;align-items:center;gap:10px">
<span style="width:32px;height:32px;border-radius:9999px;background:{{ wsUserBg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">{{ wsUserInit }}</span>
<span style="font-size:13px;font-weight:700">{{ wsUserName }}</span>
<button onClick="{{ logout }}" style="height:36px;padding:0 14px;border:1px solid #E8E5E1;background:#fff;color:#C43F3F;border-radius:9999px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer" style-hover="background:#FFF5F5"><i class="fa-solid fa-arrow-right-from-bracket" style="margin-right:7px"></i>Sign out</button>
</span>
</div>
<div style="flex:1;min-height:0;height:calc(100vh - 56px)">

<sc-if value="{{ isLeo }}" hint-placeholder-val="{{ false }}">
<dc-import name="CoordinatorWorkspace" style="width:100%;height:100%;display:block" hint-size="100%,100%"></dc-import>
</sc-if>
<sc-if value="{{ isAmy }}" hint-placeholder-val="{{ false }}">
<dc-import name="AlliedHealthWorkspace" style="width:100%;height:100%;display:block" hint-size="100%,100%"></dc-import>
</sc-if>

</div>
</div>
</sc-if>

<sc-if value="{{ isAdminScreen }}" hint-placeholder-val="{{ false }}">
<div style="width:100%;height:100vh">
<dc-import name="AdminPortal" on-logout="{{ logout }}" style="width:100%;height:100%;display:block" hint-size="100%,100%"></dc-import>
</div>
</sc-if>

<sc-if value="{{ isMobileScreen }}" hint-placeholder-val="{{ false }}">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:8px;box-sizing:border-box">
<x-import component-from-global-scope="IOSDevice" from="./ios-frame.jsx" width="{{ frameW }}" height="{{ frameH }}" hint-size="430px,900px">
<div style="width:100%;height:100%">

<sc-if value="{{ isMaya }}" hint-placeholder-val="{{ true }}">
<dc-import name="RiderApp" on-logout="{{ logout }}" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
</sc-if>
<sc-if value="{{ isAnna }}" hint-placeholder-val="{{ false }}">
<dc-import name="SupporterApp" on-logout="{{ logout }}" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
</sc-if>
<sc-if value="{{ isDeb }}" hint-placeholder-val="{{ false }}">
<dc-import name="DriverApp" role="contractor" on-logout="{{ logout }}" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
</sc-if>
<sc-if value="{{ isLena }}" hint-placeholder-val="{{ false }}">
<dc-import name="DriverApp" role="employed" on-logout="{{ logout }}" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
</sc-if>
<sc-if value="{{ isRegParticipant }}" hint-placeholder-val="{{ false }}">
<dc-import name="ParticipantOnboarding" start="participant" on-logout="{{ logout }}" on-done="{{ goRider }}" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
</sc-if>
<sc-if value="{{ isRegSupporter }}" hint-placeholder-val="{{ false }}">
<dc-import name="ParticipantOnboarding" start="supporter" on-logout="{{ logout }}" on-done="{{ goRider }}" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
</sc-if>
<sc-if value="{{ isRegDriver }}" hint-placeholder-val="{{ false }}">
<dc-import name="DriverOnboarding" on-logout="{{ logout }}" on-done="{{ goDriver }}" style="width:100%;height:100%" hint-size="100%,100%"></dc-import>
</sc-if>

</div>
</x-import>
</div>
</sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;menu&quot;,&quot;options&quot;:[&quot;menu&quot;,&quot;leo&quot;,&quot;amy&quot;,&quot;admin&quot;,&quot;maya&quot;,&quot;anna&quot;,&quot;deb&quot;,&quot;lena&quot;,&quot;reg-participant&quot;,&quot;reg-supporter&quot;,&quot;reg-driver&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo&quot;}}">
class Component extends DCLogic {
  state = { screen: null, vw: window.innerWidth, vh: window.innerHeight };
  componentDidMount() {
    this._onResize = () => this.setState({ vw: window.innerWidth, vh: window.innerHeight });
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() {
    if (this._onResize) window.removeEventListener('resize', this._onResize);
  }
  renderVals() {
    const S = this.state;
    const screen = S.screen ?? (this.props.startScreen && this.props.startScreen !== 'menu' ? this.props.startScreen : null);
    const toMenu = () => this.setState({ screen: null });

    // fill nearly the whole viewport on a phone; keep the compact mockup size on desktop
    const isNarrow = S.vw <= 680;
    const frameW = isNarrow ? Math.min(S.vw - 16, 460) : 402;
    const frameH = isNarrow ? Math.min(S.vh - 16, 960) : 874;

    // --- Web portals ---
    const wsDefs = [
      { k: 'leo', icon: 'fa-briefcase', avBg: '#FFF5F5', avFg: '#E85555', name: 'Coordinator workspace', desc: 'Leo Marsh · Northside Coordination · caseload, onboarding, claims', label: 'COORDINATOR WORKSPACE', userInit: 'LM', userName: 'Leo Marsh', userBg: '#FF6B6B' },
      { k: 'amy', icon: 'fa-user-doctor', avBg: '#F5F3FF', avFg: '#5647C9', name: 'Allied health workspace', desc: 'Dr Amy Ngo · OT · referrals, assessments, requirements', label: 'ALLIED HEALTH', userInit: 'AN', userName: 'Dr Amy Ngo', userBg: '#6C5CE7' },
      { k: 'admin', icon: 'fa-building-shield', avBg: '#F5F3FF', avFg: '#5647C9', name: 'Admin Portal', desc: 'Priya Narayan · live ops, dispatch, participants, fleet, compliance', label: 'ADMIN PORTAL', userInit: 'PN', userName: 'Priya Narayan', userBg: '#6C5CE7' },
    ];
    const cur = wsDefs.find(w => w.k === screen);

    // --- Mobile ---
    const mobDefs = [
      { k: 'maya', init: 'MP', avBg: '#FF6B6B', name: 'Maya Patel', desc: 'Participant · books her own rides', reg: 'reg-participant' },
      { k: 'anna', init: 'AP', avBg: '#FF8E8E', name: 'Anna Patel', desc: 'Supporter · books for Maya and Sam', reg: 'reg-supporter' },
      { k: 'deb', init: 'DK', avBg: '#6C5CE7', name: 'Deb Kowalski', desc: 'Contractor driver · CareDriver tier', reg: 'reg-driver' },
      { k: 'lena', init: 'LV', avBg: '#5647C9', name: 'Lena Voss', desc: 'Employed driver · Complex tier, rostered', reg: 'reg-driver' },
    ];

    const isLeo = screen === 'leo', isAmy = screen === 'amy', isAdmin = screen === 'admin';
    const isMaya = screen === 'maya', isAnna = screen === 'anna', isDeb = screen === 'deb', isLena = screen === 'lena';
    const isRegParticipant = screen === 'reg-participant', isRegSupporter = screen === 'reg-supporter', isRegDriver = screen === 'reg-driver';

    return {
      isMenu: !screen,
      isWebScreen: isLeo || isAmy,
      isAdminScreen: isAdmin,
      isMobileScreen: isMaya || isAnna || isDeb || isLena || isRegParticipant || isRegSupporter || isRegDriver,

      webList: wsDefs.map(w => ({ ...w, onPick: () => this.setState({ screen: w.k }) })),
      mobList: mobDefs.map(d => ({ ...d, onPick: () => this.setState({ screen: d.k }), onReg: () => this.setState({ screen: d.reg }), hasReg: !!d.reg })),

      isLeo, isAmy,
      wsLabel: cur ? cur.label : '', wsUserInit: cur ? cur.userInit : '', wsUserName: cur ? cur.userName : '', wsUserBg: cur ? cur.userBg : '#2D3748',

      isMaya, isAnna, isDeb, isLena,
      isRegParticipant, isRegSupporter, isRegDriver,
      goRider: () => this.setState({ screen: 'maya' }),
      goDriver: () => this.setState({ screen: 'deb' }),
      frameW, frameH,

      logout: toMenu,
    };
  }
}
</script>
</body>
</html>
